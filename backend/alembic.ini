# Alembic configuration file
# Generated for: smart-traffic-system backend

[alembic]
# Path to migration scripts
script_location = migrations

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone for generated migration filenames
timezone = UTC

# Max length of auto-generated slugs
truncate_slug_length = 40

# Database URL – overridden at runtime by env.py reading DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://traffic_user:traffic_pass@localhost:5432/traffic_db

[post_write_hooks]
# Optional: run black on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
